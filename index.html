<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Js Photobooth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>My Javascript Photobooth</h1>
    
    <div id="app-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="overlayCanvas"></canvas>
    </div>

    <div id="photo-strip">
        <canvas class="slot"></canvas>
        <canvas class="slot"></canvas>
        <canvas class="slot"></canvas>
    </div>

    <div class="controls">
        <button id="snap">Snap!</button>
        <button id="retake" class="hidden">Take New Photos</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
